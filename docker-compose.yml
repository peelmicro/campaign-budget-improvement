services:
  mysql:
    image: mysql:8.4
    container_name: campaign-budget-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: campaign_budget_interview
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: campaign-budget-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: campaign_budget_interview
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: campaign-budget-web
    restart: unless-stopped
    ports:
      - '4200:80'
    depends_on:
      - api

volumes:
  mysql_data:
